<!DOCTYPE html>

<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Proceder al Pago y Envío - GodArt</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@500;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "tertiary-container": "#b05e41",
                        "on-secondary-container": "#476b65",
                        "on-primary-fixed": "#00201c",
                        "on-tertiary-fixed-variant": "#763219",
                        "on-tertiary-container": "#fffbff",
                        "outline": "#6d7a77",
                        "on-background": "#171d1b",
                        "on-secondary-fixed": "#00201c",
                        "surface-container-low": "#f0f5f2",
                        "inverse-surface": "#2c3130",
                        "primary-fixed": "#8df5e4",
                        "surface-bright": "#f6faf8",
                        "surface-dim": "#d6dbd9",
                        "surface-tint": "#006b5f",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#3d4946",
                        "outline-variant": "#bcc9c5",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#70d8c8",
                        "primary": "#00685d",
                        "secondary-container": "#c3ebe2",
                        "surface": "#f6faf8",
                        "primary-container": "#008376",
                        "tertiary": "#91462c",
                        "inverse-on-surface": "#edf2ef",
                        "secondary-fixed": "#c3ebe2",
                        "on-secondary-fixed-variant": "#294d47",
                        "on-surface": "#171d1b",
                        "secondary-fixed-dim": "#a8cec6",
                        "on-tertiary-fixed": "#390c00",
                        "tertiary-fixed": "#ffdbcf",
                        "secondary": "#41655f",
                        "on-primary-fixed-variant": "#005048",
                        "background": "#f6faf8",
                        "surface-variant": "#dfe4e1",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#f4fffb",
                        "surface-container": "#eaefec",
                        "tertiary-fixed-dim": "#ffb59c",
                        "primary-fixed-dim": "#70d8c8",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#dfe4e1",
                        "surface-container-high": "#e4e9e7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-gray-50 font-body text-slate-800 antialiased min-h-screen flex flex-col">
    <!-- TopNavBar -->

    <!-- Delivery Method -->
    <section>
        <h2 class="text-xl font-bold text-slate-900 mb-4 font-headline">Método de entrega</h2>
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <label
                class="flex items-center p-4 border-b border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors">
                <div class="relative flex items-center">
                    <input checked="" class="peer sr-only" name="delivery" type="radio" />
                    <div
                        class="w-6 h-6 rounded-full border-2 border-slate-300 peer-checked:border-[#00897B] peer-checked:bg-[#00897B] flex items-center justify-center transition-colors">
                        <span
                            class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100">check</span>
                    </div>
                </div>
                <span class="ml-4 flex-grow text-slate-800 font-medium">Recoger en tienda (Gratis)</span>
                <span class="material-symbols-outlined text-[#00897B]">check</span>
            </label>
            <label class="flex items-center p-4 cursor-pointer hover:bg-slate-50 transition-colors">
                <div class="relative flex items-center">
                    <input class="peer sr-only" name="delivery" type="radio" />
                    <div
                        class="w-6 h-6 rounded-full border-2 border-slate-300 peer-checked:border-[#00897B] peer-checked:bg-[#00897B] flex items-center justify-center transition-colors">
                        <span
                            class="material-symbols-outlined text-white text-[16px] opacity-0 peer-checked:opacity-100">check</span>
                    </div>
                </div>
                <span class="ml-4 text-slate-800 font-medium">Envío a domicilio (+$10.00 MXN)</span>
            </label>
        </div>
    </section>
    <!-- Shipping Details -->
    <section>
        <h2 class="text-xl font-bold text-slate-900 mb-4 font-headline">Detalles de Envío</h2>
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden divide-y divide-slate-100">
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Nombre Completo" type="text" />
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Dirección" type="text" />
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Ciudad" type="text" />
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Estado" type="text" />
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Código Postal" type="text" />
            <input
                class="w-full px-4 py-4 border-0 focus:ring-0 text-slate-800 placeholder-slate-500 font-medium bg-transparent"
                placeholder="Teléfono" type="tel" />
        </div>
    </section>
    </div>
    <!-- Desktop Action Buttons -->
    <div class="hidden md:flex justify-end gap-4 mt-8 pt-8 border-t border-slate-200">
        <button
            class="flex items-center gap-2 px-6 py-2.5 rounded-full border border-red-200 text-red-600 bg-red-50 hover:bg-red-100 transition-colors font-medium">
            <span class="material-symbols-outlined text-[20px]">delete</span>
            Eliminar todo
        </button>
        <button
            class="px-6 py-2.5 rounded-full border border-[#00897B] text-[#00897B] hover:bg-teal-50 transition-colors font-medium">
            Continuar comprando
        </button>
        <button
            class="px-6 py-2.5 rounded-full bg-[#005f56] text-white hover:bg-teal-900 transition-colors font-medium shadow-md">
            Proceder al pago
        </button>
    </div>
    </div>
    </main>
    <!-- Mobile Sticky Footer Summary -->
    <div
        class="md:hidden fixed bottom-0 left-0 w-full bg-[#20B2AA] text-white rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.1)] z-40 p-6 space-y-4">
        <div class="space-y-1">
            <div class="flex justify-between text-teal-50">
                <span>Subtotal (1 artículo):</span>
                <span>$28.00</span>
            </div>
            <div class="flex justify-between text-teal-50">
                <span>Envío:</span>
                <span>$0.00</span>
            </div>
            <div class="flex justify-between font-bold text-lg pt-2">
                <span>Total:</span>
                <span>$28.00</span>
            </div>
        </div>
        <button
            class="w-full bg-[#00897B] text-white font-bold py-4 rounded-xl text-lg hover:bg-teal-700 transition-colors shadow-sm">
            Finalizar Compra
        </button>
    </div>
    <!-- Desktop Footer -->
    <footer
        class="hidden md:grid bg-slate-50 dark:bg-slate-950 font-inter text-sm antialiased w-full py-12 px-8 bg-slate-100 dark:bg-slate-900 flat grid-cols-1 md:grid-cols-2 gap-8 items-center max-w-7xl mx-auto border-t border-slate-200/50 mt-auto">
        <div class="flex flex-col gap-4">
            <span class="text-lg font-bold text-slate-900 dark:text-slate-100">GodArt</span>
            <p class="text-slate-500 dark:text-slate-400">© 2024 GodArt Fine Art Supplies. The Curated Canvas.</p>
        </div>
        <div class="flex flex-wrap gap-6 md:justify-end">
            <a class="text-slate-500 dark:text-slate-400 hover:text-[#00897B] dark:hover:text-teal-400 transition-colors opacity-100 hover:opacity-80 transition-opacity"
                href="#">Materiales</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-[#00897B] dark:hover:text-teal-400 transition-colors opacity-100 hover:opacity-80 transition-opacity"
                href="#">Talleres</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-[#00897B] dark:hover:text-teal-400 transition-colors opacity-100 hover:opacity-80 transition-opacity"
                href="#">Galería</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-[#00897B] dark:hover:text-teal-400 transition-colors opacity-100 hover:opacity-80 transition-opacity"
                href="#">Envíos</a>
            <a class="text-slate-500 dark:text-slate-400 hover:text-[#00897B] dark:hover:text-teal-400 transition-colors opacity-100 hover:opacity-80 transition-opacity"
                href="#">Privacidad</a>
        </div>
    </footer>
</body>

</html>
